# Tema "Neon studio" scuro per "Sonder"
[theme]
base = "dark"
primaryColor = "#ff2d78"
backgroundColor = "#07070f"
secondaryBackgroundColor = "#11111f"
textColor = "#e8e6f5"
font = "sans serif"

[server]
headless = true
enableStaticServing = true
address = "0.0.0.0"
port = 5000
enableCORS = false
enableXsrfProtection = false

[browser]
gatherUsageStats = false
